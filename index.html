<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎸</text></svg>">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>吉他學習筆記</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f0f;color:#e0e0e0;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex}

/* ── Sidebar ── */
#sidebar{width:220px;min-width:220px;min-height:100vh;background:#141414;border-right:1px solid #222;display:flex;flex-direction:column;flex-shrink:0;transition:width .25s,min-width .25s;overflow:hidden}
#sidebar.collapsed{width:40px;min-width:40px}
#sb-content{display:flex;flex-direction:column;flex:1;overflow:hidden}
#sidebar.collapsed #sb-content{display:none}
#sidebar.collapsed #sb-toggle-icon{transform:rotate(180deg)}
#sb-head{padding:14px 14px 12px;border-bottom:1px solid #222;display:flex;align-items:center;gap:8px;cursor:pointer;flex-shrink:0}
#sb-brand{flex:1;min-width:0}
.sidebar-brand-title{font-size:1rem;font-weight:700;color:#e8c97a}
.sidebar-brand-sub{font-size:.75rem;color:#666;margin-top:3px}
#sb-toggle{width:26px;height:26px;border-radius:6px;border:1px solid #2a2a2a;background:transparent;color:#666;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s,color .15s}
#sb-toggle:hover{background:#222;color:#ccc}
#sb-toggle-icon{font-size:10px;transition:transform .25s;display:inline-block}
.sidebar-divider{height:1px;background:#222;margin:0 14px 8px}
.sidebar-stat{padding:10px 16px 12px}
.sidebar-stat-label{font-size:11px;color:#666;display:flex;justify-content:space-between;margin-bottom:4px}
.sidebar-prog{height:4px;background:#222;border-radius:2px;overflow:hidden}
.sidebar-prog-fill{height:100%;border-radius:2px;background:#e8c97a;transition:width .4s}
.sidebar-nav{padding:0 8px 8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;color:#888;font-size:.88rem;transition:all .2s;margin-bottom:2px;border:none;background:transparent;width:100%;text-align:left}
.nav-item:hover{background:#1e1e1e;color:#ccc}
.nav-item.active{background:#2a1e00;color:#e8c97a}
.nav-icon{font-size:1rem;width:20px;text-align:center}
/* song list in sidebar */
#song-list{overflow-y:auto;flex:1;border-top:1px solid #222}
.artist-hd{padding:9px 14px;cursor:pointer;display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;color:#666;letter-spacing:.5px;text-transform:uppercase;user-select:none;transition:background .15s;border-bottom:1px solid #1e1e1e}
.artist-hd:hover{background:#1a1a1a;color:#aaa}
.artist-hd.open{color:#e8c97a}
.artist-arrow{font-size:8px;transition:transform .2s;display:inline-block;flex-shrink:0}
.artist-hd.open .artist-arrow{transform:rotate(90deg)}
.artist-songs{overflow:hidden}
.artist-songs.closed{display:none}
.s-item{padding:7px 12px 7px 28px;cursor:pointer;border-left:3px solid transparent;font-size:.84rem;color:#888;transition:background .15s,border-color .15s,color .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-item:hover{background:#1e1e1e;color:#ccc}
.s-item.active{background:#2a1e00;border-left-color:#e8c97a;color:#e8c97a}

/* ── Content ── */
#content{flex:1;padding:28px 32px;overflow-y:auto;max-width:900px}

/* ── Home ── */
.home-title{font-size:1.3rem;font-weight:700;color:#e8c97a;margin-bottom:20px}
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px}
.stat-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:16px 20px}
.stat-label{font-size:.75rem;color:#888;margin-bottom:4px}
.stat-val{font-size:1.8rem;font-weight:700;color:#e8c97a}
.stat-sub{font-size:.75rem;color:#666;margin-top:2px}
.prog-bar{height:6px;background:#2a2a2a;border-radius:3px;margin-top:8px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;background:#e8c97a;transition:width .4s}
.section-title{font-size:.8rem;color:#666;font-weight:600;margin-bottom:12px;text-transform:uppercase;letter-spacing:.06em}
.song-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:28px}
.song-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:14px;cursor:pointer;transition:border-color .2s}
.song-card:hover{border-color:#e8c97a}
.song-card-title{font-size:.95rem;font-weight:600;margin-bottom:4px}
.song-card-meta{font-size:.75rem;color:#888}

/* ── Chord view ── */
#chord-view{display:none}
#chord-view.show{display:block}
.chord-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.chord-filter-btn{padding:5px 14px;border:1px solid #333;border-radius:20px;background:transparent;color:#aaa;cursor:pointer;font-size:.8rem;transition:all .2s}
.chord-filter-btn.active{border-color:#e8c97a;color:#e8c97a;background:#2a1a00}
.chord-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.c-card{perspective:600px;height:240px;cursor:pointer}
.c-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .45s}
.c-card.flipped .c-inner{transform:rotateY(180deg)}
.c-face,.c-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:12px;border:1px solid #2a2a2a;display:flex;flex-direction:column;align-items:center;background:#1a1a1a;padding:14px 12px}
.c-face{justify-content:flex-start}
.c-back{justify-content:space-between}
.c-back{transform:rotateY(180deg);justify-content:space-between}
.c-name{font-size:1.6rem;font-weight:700;color:#e8c97a}
.c-type{font-size:.75rem;color:#888;margin-top:4px}
.c-learned-tag{font-size:.7rem;color:#4caf7d;margin-top:8px}
.c-card.learned .c-face,.c-card.learned .c-back{background:#3a4a3a;border:1px solid #4caf7d}
.c-diagram{flex:1;display:flex;align-items:center;justify-content:center;width:100%}
.c-chk-btn{margin-top:8px;font-size:10px;color:#888;display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.06);border:1px solid #333;border-radius:20px;padding:4px 12px;cursor:pointer;transition:background .15s,border-color .15s}
.c-chk-btn:hover{background:rgba(255,255,255,.1);border-color:#e8c97a}
.c-card.learned .c-chk-btn{color:#4caf7d;border-color:#4caf7d}

/* ── Song view ── */
#song-view{display:none}
#song-view.show{display:block}
.back-btn{padding:6px 14px;background:#2a2a2a;border:none;border-radius:6px;color:#aaa;cursor:pointer;font-size:.8rem;margin-bottom:16px}
.back-btn:hover{color:#e8c97a}
.song-header{margin-bottom:20px}
.mode-toggle{display:flex;gap:6px;margin-top:12px}
.mode-btn{padding:4px 14px;border-radius:4px;border:1px solid #2a2a2a;background:transparent;color:#555;font-size:.82rem;cursor:pointer;transition:background .15s,color .15s,border-color .15s}
.mode-btn.active{background:#2a1e00;color:#e8c97a;border-color:#5a4010}
.mode-btn:hover:not(.active){background:#1e1e1e;color:#aaa}
.tab-line{margin-bottom:20px}
.tab-chord-card{display:inline-flex;flex-direction:column;align-items:center;cursor:pointer;margin-right:4px}
.tab-chord-label{font-size:.78rem;color:#e8c97a;font-weight:600;margin-bottom:2px}
.tab-lyrics-row{color:#888;font-size:.88rem;margin-top:4px;font-style:italic;line-height:1.5}
.song-title-lg{font-size:1.4rem;font-weight:700;color:#e8c97a}
.song-artist-sm{font-size:.85rem;color:#888;margin-top:2px}
.sheet{line-height:2;font-size:.95rem}
.sheet-line{margin-bottom:4px}
.chord-row{height:1.4em;color:#e8c97a;font-size:.82rem;font-weight:600;letter-spacing:.03em}
.lyrics-row{color:#e0e0e0}
.inline-chord{display:inline-block;margin-right:4px;cursor:pointer;text-decoration:underline dotted}
.inline-chord:hover{color:#fff}

/* chord popup */
.chord-popup{position:fixed;background:#222;border:1px solid #444;border-radius:12px;padding:14px;z-index:100;display:none;flex-direction:column;align-items:center;gap:8px;box-shadow:0 8px 32px #0008}
.chord-popup.show{display:flex}
.chord-popup-name{font-size:1rem;font-weight:700;color:#e8c97a}
/* chord learned */
.popup-learn-btn{font-size:10px;color:#888;display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.06);border:1px solid #333;border-radius:20px;padding:4px 12px;cursor:pointer;transition:background .15s,border-color .15s}
.popup-learn-btn:hover{background:rgba(255,255,255,.1);border-color:#e8c97a}
.popup-learn-btn.learned{color:#4caf7d;border-color:#4caf7d}
.tab-chord-card.learned .tab-chord-label{color:#4caf7d}
.inline-chord.learned{color:#4caf7d}

/* ── CAGED family tabs ── */
.caged-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.caged-tab{padding:5px 16px;border:1px solid #333;border-radius:20px;background:transparent;color:#888;cursor:pointer;font-size:.8rem;transition:all .2s}
.caged-tab:hover{border-color:#555;color:#ccc}
/* family chip on card front */
.fam-chip{display:inline-block;font-size:.6rem;font-weight:700;letter-spacing:.04em;padding:1px 8px;border-radius:10px;margin-bottom:5px}
.fam-chip-E{background:rgba(91,141,217,.18);color:#5b8dd9;border:1px solid rgba(91,141,217,.35)}
.fam-chip-A{background:rgba(217,149,91,.18);color:#d9955b;border:1px solid rgba(217,149,91,.35)}
.fam-chip-D{background:rgba(91,217,140,.18);color:#5bd98c;border:1px solid rgba(91,217,140,.35)}
/* CAGED insight banner */
.caged-banner{border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:.8rem;line-height:1.6;display:none}
.caged-banner.show{display:block}
/* memory tip on card front */
.c-memory-tip{font-size:.63rem;color:#555;margin-top:7px;line-height:1.5;text-align:center;padding:0 4px;transition:color .2s}
.c-card:hover .c-memory-tip{color:#999}
/* prototype button (inside flipped card back) */
.proto-btn{font-size:.68rem;color:#5b8dd9;background:rgba(91,141,217,.08);border:1px solid rgba(91,141,217,.28);border-radius:12px;padding:3px 10px;cursor:pointer;transition:all .15s;white-space:nowrap}
.proto-btn:hover{background:rgba(91,141,217,.2);border-color:#5b8dd9}
/* prototype overlay */
.proto-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:center;justify-content:center}
.proto-overlay.show{display:flex}
.proto-box{background:#1e1e1e;border:1px solid #333;border-radius:16px;padding:26px 28px;max-width:500px;width:92%;position:relative;animation:fuUp .2s ease}
@keyframes fuUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.proto-close-btn{position:absolute;top:12px;right:14px;background:none;border:none;color:#555;font-size:18px;cursor:pointer;line-height:1;padding:2px 6px;border-radius:4px}
.proto-close-btn:hover{color:#ccc;background:#2a2a2a}
.proto-box-title{font-size:.7rem;color:#555;text-transform:uppercase;letter-spacing:.07em;margin-bottom:18px}
.proto-row{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}
.proto-side{display:flex;flex-direction:column;align-items:center;gap:4px}
.proto-side-name{font-size:1.05rem;font-weight:700;color:#e8c97a}
.proto-side-lbl{font-size:.72rem;color:#666}
.proto-mid{display:flex;flex-direction:column;align-items:center;gap:2px;color:#5b8dd9;font-size:.72rem;text-align:center;padding:0 4px}
.proto-mid-arrow{font-size:1.8rem;line-height:1}
.proto-insight{margin-top:18px;font-size:.8rem;color:#aaa;line-height:1.7;background:#131313;border-radius:8px;padding:10px 14px;border-left:2px solid #5b8dd9}

/* ── Ghost dots ── */
@keyframes ghostBlink{0%,100%{fill:rgba(255,80,80,.12);stroke:rgba(255,80,80,.5)}50%{fill:rgba(255,80,80,.4);stroke:rgba(255,80,80,1)}}
.chord-ghost{fill:none;stroke:rgba(255,80,80,0);stroke-dasharray:5,3;stroke-width:2.5}
.c-card:hover .chord-ghost,.ghost-on .chord-ghost{animation:ghostBlink 1s ease-in-out infinite}
.diff-msg{font-size:.65rem;color:#c84b4b;text-align:center;margin-top:4px;padding:0 6px;line-height:1.5}

/* ── Train view ── */
#train-view{display:none}
.train-sec{background:#141414;border:1px solid #222;border-radius:12px;padding:20px;margin-bottom:18px}
.train-sec-hd{font-size:.72rem;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px}

/* ── Flashcard ── */
.fc-wrap{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:16px;padding:28px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px;min-height:300px;justify-content:center}
.fc-name{font-size:3rem;font-weight:800;color:#e8c97a;letter-spacing:.02em;line-height:1}
.fc-full{font-size:.82rem;color:#555;margin-top:-6px}
.fc-diagram{min-height:160px;display:flex;align-items:center;justify-content:center}
@keyframes fcIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
.fc-diagram.revealed{animation:fcIn .35s ease}
.fc-ctrls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.fc-btn{padding:7px 18px;border:1px solid #333;border-radius:8px;font-size:.83rem;cursor:pointer;transition:all .2s;background:transparent;color:#888}
.fc-btn:hover{border-color:#e8c97a;color:#e8c97a}
.fc-btn-reveal{color:#5b8dd9;border-color:rgba(91,141,217,.5);background:rgba(91,141,217,.07)}
.fc-btn-reveal:hover{background:rgba(91,141,217,.18);border-color:#5b8dd9;color:#5b8dd9}
.fc-btn-got{color:#4caf7d;border-color:rgba(76,175,125,.5);background:rgba(76,175,125,.07)}
.fc-btn-got:hover{background:rgba(76,175,125,.18);border-color:#4caf7d;color:#4caf7d}
.fc-btn-miss{color:#c84b4b;border-color:rgba(200,75,75,.5);background:rgba(200,75,75,.07)}
.fc-btn-miss:hover{background:rgba(200,75,75,.18);border-color:#c84b4b;color:#c84b4b}
.fc-meta{display:flex;justify-content:space-between;align-items:center;width:100%;font-size:.75rem;color:#555}
.fc-streak-n{color:#e8c97a;font-weight:700;font-size:1.1rem}

/* ── Slide trainer ── */
.slide-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
.slide-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:14px 12px;display:flex;flex-direction:column;align-items:center;gap:8px}
.slide-card-name{font-size:1.05rem;font-weight:700;color:#e8c97a}
.slide-card-sub{font-size:.65rem;color:#555}
.slide-play-btn{width:100%;padding:5px 0;font-size:.73rem;color:#d9955b;background:rgba(217,149,91,.07);border:1px solid rgba(217,149,91,.3);border-radius:10px;cursor:pointer;transition:all .15s}
.slide-play-btn:hover:not(:disabled){background:rgba(217,149,91,.18);border-color:#d9955b}
.slide-play-btn:disabled{opacity:.35;cursor:default}

/* ── Chord Detector ── */
.det-wrap{display:flex;flex-direction:column;align-items:center;gap:14px}
.det-mic-btn{padding:11px 32px;font-size:.95rem;font-weight:700;border-radius:50px;border:2px solid #444;background:transparent;color:#888;cursor:pointer;transition:all .25s;letter-spacing:.04em}
.det-mic-btn:hover{border-color:#aaa;color:#ccc}
.det-mic-btn.active{border-color:#c84b4b;color:#c84b4b;background:rgba(200,75,75,.1);animation:micPulse 1.2s ease-in-out infinite}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(200,75,75,.4)}50%{box-shadow:0 0 0 10px rgba(200,75,75,0)}}
.det-canvas{width:100%;height:56px;border-radius:6px;background:#111;border:1px solid #1e1e1e}
.det-result{width:100%;display:flex;flex-direction:column;gap:8px}
.det-big{font-size:2.8rem;font-weight:800;color:#e8c97a;letter-spacing:.04em;min-height:64px;display:flex;align-items:center;justify-content:center;width:100%}
.det-chord-row{display:flex;align-items:center;gap:10px}
.det-chord-name{font-size:1rem;font-weight:700;color:#e8c97a;width:58px;flex-shrink:0}
.det-bar-bg{flex:1;height:7px;background:#222;border-radius:4px;overflow:hidden}
.det-bar-fill{height:100%;border-radius:4px;background:#e8c97a;transition:width .18s}
.det-bar-fill.r2{background:#555}
.det-bar-fill.r3{background:#333}
.det-pct{font-size:.73rem;color:#555;width:34px;text-align:right}
.det-hint{font-size:.72rem;color:#444;text-align:center;line-height:1.6}

/* ── Quiz zone ── */
.qz-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.qz-tab{padding:7px 18px;border:1px solid #333;border-radius:20px;background:transparent;color:#666;font-size:.83rem;cursor:pointer;transition:all .2s}
.qz-tab:hover:not(:disabled){border-color:#555;color:#ccc}
.qz-tab.active{border-color:#e8c97a;color:#e8c97a;background:#2a1a00}
.qz-tab:disabled{opacity:.35;cursor:default}
.qz-wrap{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:16px;padding:28px;display:flex;flex-direction:column;align-items:center;gap:16px;min-height:300px;justify-content:center}
.qz-question{font-size:3rem;font-weight:800;color:#e8c97a;letter-spacing:.03em;line-height:1}
.qz-subtitle{font-size:.82rem;color:#555;margin-top:-10px}
.qz-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:480px}
.qz-opt{background:#111;border:2px solid #222;border-radius:10px;padding:8px;cursor:pointer;transition:border-color .15s,background .15s;display:flex;align-items:center;justify-content:center}
.qz-opt:hover:not(.answered){border-color:#555;background:#181818}
.qz-opt.correct{border-color:#4caf7d !important;background:rgba(76,175,125,.1)}
.qz-opt.wrong{border-color:#c84b4b !important;background:rgba(200,75,75,.08)}
.qz-opt.answered{cursor:default}
.qz-meta{display:flex;justify-content:space-between;align-items:center;width:100%;font-size:.75rem;color:#555}
.qz-streak-n{color:#e8c97a;font-weight:700;font-size:1.1rem}
</style>
</head>
<body>

<!-- Sidebar -->
<nav id="sidebar">
  <div id="sb-head" onclick="switchTab('home')">
    <div id="sb-brand">
      <div class="sidebar-brand-title">🎸 吉他學習筆記</div>
      <div class="sidebar-brand-sub">Electric Guitar</div>
    </div>
    <button id="sb-toggle" onclick="event.stopPropagation();toggleSidebar()" title="收起側欄">
      <span id="sb-toggle-icon">◀</span>
    </button>
  </div>
  <div id="sb-content">
    <div class="sidebar-stat" id="sidebar-stat"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-nav">
      <button class="nav-item" id="nav-chord" onclick="switchTab('chord')">
        <span class="nav-icon">🎵</span>和弦記憶
      </button>
      <button class="nav-item" id="nav-train" onclick="switchTab('train')">
        <span class="nav-icon">💪</span>肌肉記憶測驗
      </button>
      <button class="nav-item" id="nav-songs" onclick="switchTab('songs')" style="justify-content:space-between">
        <span><span class="nav-icon">📄</span>吉他譜</span>
        <span id="songs-nav-arrow" style="font-size:.65rem;transition:transform .25s;display:inline-block">▶</span>
      </button>
    </div>
    <div id="song-list" style="display:none;overflow-y:auto;max-height:calc(100vh - 260px);border-top:1px solid #1e1e1e"></div>
  </div>
</nav>

<!-- Content -->
<div id="content">
  <div id="home-view"></div>
  <div id="chord-view"></div>
  <div id="song-view"></div>
  <div id="train-view"></div>
</div>

<!-- Chord popup -->
<div class="chord-popup" id="chord-popup" onclick="closePopup()">
  <div class="chord-popup-name" id="popup-name"></div>
  <div id="popup-diagram"></div>
  <div id="popup-diff" style="font-size:.7rem;color:#c84b4b;text-align:center;padding:0 8px;display:none"></div>
  <button class="popup-learn-btn" id="popup-learn-btn" onclick="event.stopPropagation();handleLearnToggle()"></button>
</div>

<!-- Prototype comparison modal -->
<div class="proto-overlay" id="proto-overlay" onclick="closeProto()">
  <div class="proto-box" onclick="event.stopPropagation()">
    <button class="proto-close-btn" onclick="closeProto()">✕</button>
    <div id="proto-content"></div>
  </div>
</div>

<script>

/* ── Intro TAB SVG ── */
function introTabSVG(){
  const W=900,H=145,ml=46,mr=12,mt=22,ss=14,nc=32;
  const sp=(W-ml-mr)/nc;
  const pts=[3,2,0,1,0,1,2,1, 3,2,0,1,0,1,2,1, 4,2,0,1,0,1,2,1, 5,2,0,1,0,1,2,1];
  const hl=new Set([0,8,16,24]);
  const sy=i=>mt+i*ss; const nx=i=>ml+(i+.5)*sp;
  let g=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:${W}px;height:auto;display:block">`;
  // strings
  for(let i=0;i<6;i++) g+=`<line x1="${ml}" y1="${sy(i)}" x2="${W-mr}" y2="${sy(i)}" stroke="#3c3c3c" stroke-width="1"/>`;
  // bar lines
  for(let m=1;m<4;m++){const x=ml+m*8*sp;g+=`<line x1="${x}" y1="${mt-5}" x2="${x}" y2="${sy(5)+5}" stroke="#555" stroke-width="1.5"/>`;}
  // note tails
  const t0=sy(5)+8,t1=t0+13;
  for(let i=0;i<nc;i+=2){const x1=nx(i),x2=nx(i+1);
    g+=`<line x1="${x1}" y1="${t0}" x2="${x1}" y2="${t1}" stroke="#484848" stroke-width="1.2"/>`;
    g+=`<line x1="${x2}" y1="${t0}" x2="${x2}" y2="${t1}" stroke="#484848" stroke-width="1.2"/>`;
    g+=`<line x1="${x1}" y1="${t1}" x2="${x2}" y2="${t1}" stroke="#484848" stroke-width="2.2"/>`;}
  // notes
  pts.forEach((si,i)=>{const x=nx(i),y=sy(si),h=hl.has(i);
    if(h) g+=`<circle cx="${x}" cy="${y}" r="9.5" fill="rgba(232,201,122,0.22)" stroke="#e8c97a" stroke-width="1.5"/>`;
    g+=`<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="central" fill="${h?'#e8c97a':'#aaa'}" font-size="11.5" font-family="monospace" font-weight="bold">×</text>`;});
  return g+'</svg>';
}

/* ── SVG chord diagram ── */
function chordSVG(ch, size=120, opts={}){
  const sw=size, sh=size+20;
  const ml=24,mr=10,mt=24,mb=10;
  const fw=sw-ml-mr, fh=sh-mt-mb;
  const strW=fw/5, fretH=fh/4;
  const nFrets=4;
  let svg=`<svg width="${sw}" height="${sh}" xmlns="http://www.w3.org/2000/svg">`;
  for(let f=0;f<=nFrets;f++){
    const y=mt+f*fretH;
    svg+=`<line x1="${ml}" y1="${y}" x2="${ml+fw}" y2="${y}" stroke="#aaa" stroke-width="${f===0?2.5:1}"/>`;
  }
  for(let s=0;s<6;s++){
    const x=ml+s*strW;
    svg+=`<line x1="${x}" y1="${mt}" x2="${x}" y2="${mt+fh}" stroke="#aaa" stroke-width="1"/>`;
  }
  if(ch.barre){
    const relFret=ch.barre.fret-ch.startFret+1;
    const y=mt+(relFret-.5)*fretH;
    const x1=ml+(6-ch.barre.to)*strW;
    const x2=ml+(6-ch.barre.from)*strW;
    svg+=`<rect x="${x1-5}" y="${y-6}" width="${x2-x1+10}" height="12" rx="6" fill="#e8c97a"/>`;
  }
  for(let s=0;s<6;s++){
    const fret=ch.strings[s];
    const x=ml+(5-s)*strW;
    if(fret===null){
      svg+=`<text x="${x}" y="${mt-8}" text-anchor="middle" fill="#888" font-size="12">×</text>`;
    } else if(fret===0){
      svg+=`<circle cx="${x}" cy="${mt-9}" r="5" fill="none" stroke="#aaa" stroke-width="1.5"/>`;
    } else {
      const relFret=fret-ch.startFret+1;
      const y=mt+(relFret-.5)*fretH;
      if(!(ch.barre && fret===ch.barre.fret)){
        svg+=`<circle cx="${x}" cy="${y}" r="${fretH*.35}" fill="#e8c97a"/>`;
        const f=ch.fingers[s];
        if(f!=null) svg+=`<text x="${x}" y="${y+4}" text-anchor="middle" fill="#111" font-size="${fretH*.38}" font-weight="bold">${f}</text>`;
      }
    }
  }
  if(ch.startFret>1)
    svg+=`<text x="${ml+fw+6}" y="${mt+fretH*.6}" fill="#888" font-size="11">${ch.startFret}fr</text>`;
  if(opts.ghosts)(opts.ghosts).forEach(g=>{
    const relFret=g.fret-ch.startFret+1;
    if(relFret<1||relFret>4)return;
    const gx=ml+(5-g.str)*strW, gy=mt+(relFret-.5)*fretH;
    svg+=`<circle class="chord-ghost" cx="${gx}" cy="${gy}" r="${fretH*.38}"/>`;
  });
  return svg+'</svg>';
}

function chordSVGBlank(size=140){
  const sw=size,sh=size+20,ml=24,mr=10,mt=24,mb=10;
  const fw=sw-ml-mr,fh=sh-mt-mb,strW=fw/5,fretH=fh/4;
  let svg=`<svg width="${sw}" height="${sh}" xmlns="http://www.w3.org/2000/svg">`;
  for(let f=0;f<=4;f++){const y=mt+f*fretH;svg+=`<line x1="${ml}" y1="${y}" x2="${ml+fw}" y2="${y}" stroke="#2e2e2e" stroke-width="${f===0?2.5:1}"/>`;}
  for(let s=0;s<6;s++){const x=ml+s*strW;svg+=`<line x1="${x}" y1="${mt}" x2="${x}" y2="${mt+fh}" stroke="#2e2e2e" stroke-width="1"/>`;}
  return svg+'</svg>';
}

function chordSVGShifted(ch, dispFret){
  const d=ch.startFret-dispFret;
  const sc={...ch,startFret:Math.max(1,dispFret),
    strings:ch.strings.map(s=>s===null?null:(s===0?0:Math.max(0,s-d))),
    barre:ch.barre?{...ch.barre,fret:Math.max(1,ch.barre.fret-d)}:null};
  return chordSVG(sc,130);
}

      <div style="display:flex;flex-wrap:wrap;gap:14px;align-items:flex-start">
        ${chords.map(cid=>{
          const ch=CHORDS.find(c=>c.id===cid);
          const lnd=isLearned(cid);
          return `<div class="tab-chord-card${lnd?' learned':''}" onclick="showPopup('${cid}',event)">
            <div class="tab-chord-label">${cid}${lnd?' ✓':''}</div>
            ${ch?chordSVG(ch,90):`<div style="width:90px;height:110px;display:flex;align-items:center;justify-content:center;color:#555">${cid}</div>`}
          </div>`;
        }).join('')}
      </div>
      ${lyrics?`<div class="tab-lyrics-row">${lyrics}</div>`:''}
    </div>`;
  }).join('');
}
function renderSheet(sheet){
  return (sheet||[]).map(block=>{
    if(block.type==='section') return `<div style="margin:16px 0 4px">
      <div>
        <span style="color:#888;font-size:.8rem;text-transform:uppercase">${block.label}</span>
        ${block.strum?`<span style="margin-left:10px;font-size:.88rem;color:#e8c97a;letter-spacing:.05em;font-family:monospace">${block.strum}</span>`:''}
      </div>
      ${block.tip?`<div style="margin-top:6px;font-size:.82rem;color:#777;line-height:1.7;padding:6px 12px;border-left:2px solid #2a2a2a">${block.tip}</div>`:''}
      ${block.tab?(block.tab.trimStart().startsWith('<svg')?`<div style="margin-top:12px;overflow-x:auto">${block.tab}</div>`:`<pre style="margin-top:10px;font-family:'Courier New',monospace;font-size:.85rem;color:#aaa;line-height:1.9;overflow-x:auto;padding:10px 14px;background:#111;border-radius:6px;border:1px solid #222">${block.tab}</pre>`):''}
    </div>`;
    const chords=block.chords||[];
    const lyrics=block.lyrics||'';
    return `<div class="sheet-line">
      <div class="chord-row">${chords.map(c=>`<span class="inline-chord${isLearned(c)?' learned':''}" onclick="showPopup('${c}',event)">${c}${isLearned(c)?' ✓':''}</span>`).join(' ')}</div>
      <div class="lyrics-row">${lyrics}</div>
    </div>`;
  }).join('');
}

/* ── Flashcard ── */
let fc={chord:null,revealed:false,streak:0,hits:0,total:0,started:false,micMode:false,detBuf:[],detLock:false};

function fcStart(){ fc.started=true; fcNext(); }
function fcNext(){
  const pool=CHORDS.filter(c=>c.type!=='power');
  fc.chord=pool[Math.floor(Math.random()*pool.length)];
  fc.revealed=false;
  fc.detBuf=[];
  fc.detLock=false;
  renderFCCard();
}
function fcReveal(){ fc.revealed=true; fc.total++; renderFCCard(); }
function fcGot(){ fc.hits++; fc.streak++; fcNext(); }
function fcMiss(){ fc.streak=0; fcNext(); }

function fcToggleMic(){
  fc.micMode=!fc.micMode;
  fc.detBuf=[];
  fc.detLock=false;
  if(fc.micMode&&!detRunning) toggleDetector();
  renderFCCard();
}

function fcProcessDetection(top){
  if(fc.detLock||fc.revealed||!fc.started||!fc.chord) return;
  if(top.s<0.42){ fc.detBuf=[]; updateFCDetIndicator(null,0); return; }
  updateFCDetIndicator(top.c.name,top.s);
  fc.detBuf.push(top.c.id);
  if(fc.detBuf.length>6) fc.detBuf.shift();
  const consistent=fc.detBuf.filter(id=>id===top.c.id).length;
  if(consistent<3) return;
  fc.detBuf=[];
  fc.detLock=true;
  if(top.c.id===fc.chord.id){
    fcAutoCorrect();
  } else {
    showFCMismatch(top.c.name);
    setTimeout(()=>{ fc.detLock=false; },1800);
  }
}

function updateFCDetIndicator(name,score){
  const el=document.getElementById('fc-det-ind');
  if(!el) return;
  if(!name){ el.innerHTML='<span style="color:#2a2a2a">🎙 聆聽中…</span>'; return; }
  const pct=Math.round(score*100);
  const col=score>0.55?'#4caf7d':score>0.42?'#e8c97a':'#555';
  el.innerHTML=`<span style="color:${col}">🎵 偵測到 ${name} · ${pct}%</span>`;
}

function fcAutoCorrect(){
  const wrap=document.querySelector('#fc-area .fc-wrap');
  if(wrap){
    wrap.style.transition='border-color .2s,background .2s';
    wrap.style.borderColor='#4caf7d';
    wrap.style.background='rgba(76,175,125,.08)';
    const badge=document.createElement('div');
    badge.style.cssText='font-size:3.5rem;animation:fcIn .25s ease;pointer-events:none';
    badge.textContent='✅';
    wrap.insertBefore(badge,wrap.firstChild);
  }
  fc.hits++; fc.streak++;
  setTimeout(()=>{ fc.detLock=false; fcNext(); },1100);
}

function showFCMismatch(name){
  const el=document.getElementById('fc-det-ind');
  if(el) el.innerHTML=`<span style="color:#c84b4b">❌ 偵測到 ${name}，再刷一次！</span>`;
}

function renderFCCard(){
  const area=document.getElementById('fc-area');
  if(!area) return;
  if(!fc.started||!fc.chord){
    area.innerHTML=`<div class="fc-wrap">
      <div style="font-size:2.5rem">🃏</div>
      <div style="font-size:1.1rem;font-weight:600;color:#ccc">快閃字卡 · 盲背挑戰</div>
      <div style="font-size:.82rem;color:#555;text-align:center">系統隨機顯示和弦名稱<br>你要在腦中默想左手按法<br>再點「看答案」驗證</div>
      <button class="fc-btn fc-btn-reveal" style="font-size:.95rem;padding:10px 28px" onclick="fcStart()">🎯 開始挑戰</button>
    </div>`;
    return;
  }
  const c=fc.chord;
  const acc=fc.total?Math.round(fc.hits/fc.total*100):'--';
  const micBtn=`<button class="fc-btn" style="${fc.micMode?'color:#5b8dd9;border-color:rgba(91,141,217,.6);background:rgba(91,141,217,.1)':''}" onclick="fcToggleMic()">
    ${fc.micMode?'🎙 刷弦偵測中':'🎙 啟用刷弦偵測'}
  </button>`;
  area.innerHTML=`<div class="fc-wrap">
    <div class="fc-name">${c.name}</div>
    <div class="fc-full">${c.full}</div>
    ${fc.revealed?`
      <div class="fc-diagram revealed ghost-on">${chordSVG(c,150,{ghosts:DIFF_HINTS[c.id]?.ghosts})}</div>
      ${DIFF_HINTS[c.id]?`<div style="font-size:.7rem;color:#c84b4b;margin-top:-6px">👆 ${DIFF_HINTS[c.id].msg}</div>`:''}
      <div class="fc-ctrls">
        <button class="fc-btn fc-btn-got" onclick="fcGot()">✅ 記住了</button>
        <button class="fc-btn fc-btn-miss" onclick="fcMiss()">🔄 再練</button>
      </div>`:`
      <div class="fc-diagram">${chordSVGBlank(150)}</div>
      ${fc.micMode
        ?`<div id="fc-det-ind" style="font-size:.78rem;min-height:1.4em;text-align:center"><span style="color:#2a2a2a">🎙 聆聽中…</span></div>`
        :`<div style="font-size:.75rem;color:#333">默想左手按法後點「看答案」</div>`}
      <div class="fc-ctrls">
        ${fc.micMode?'':`<button class="fc-btn fc-btn-reveal" onclick="fcReveal()">👁 看答案</button>`}
        <button class="fc-btn" onclick="fcNext()">⏭ 跳過</button>
        ${micBtn}
      </div>`}
    <div class="fc-meta">
      <div>🔥 連續 <span class="fc-streak-n">${fc.streak}</span></div>
      <div>${fc.total} 題 · 正確率 ${fc.total?acc+'%':'--'}</div>
    </div>
  </div>`;
}

/* ── Quiz zone ── */
let trainMode='pick';
let qz={chord:null,options:[],answered:false,chosen:null,streak:0,hits:0,total:0,started:false};

function setTrainMode(mode){
  trainMode=mode;
  if(mode!=='strum'){ fc.micMode=false; stopDetector(); }
  renderTrain();
}

function qzStart(){ qz.started=true; qzNext(); }
function qzNext(){
  const pool=CHORDS.filter(c=>c.type!=='power');
  qz.chord=pool[Math.floor(Math.random()*pool.length)];
  const wrong=pool.filter(c=>c.id!==qz.chord.id).sort(()=>Math.random()-.5).slice(0,3);
  qz.options=[...wrong,qz.chord].sort(()=>Math.random()-.5);
  qz.answered=false; qz.chosen=null;
  renderQuizPick();
}
function qzAnswer(id){
  if(qz.answered) return;
  qz.answered=true; qz.chosen=id; qz.total++;
  const ok=id===qz.chord.id;
  if(ok){qz.hits++;qz.streak++;}else{qz.streak=0;}
  renderQuizPick();
  setTimeout(qzNext, ok?900:1800);
}
function renderQuizPick(){
  const area=document.getElementById('qz-area');
  if(!area) return;
  if(!qz.started||!qz.chord){
    area.innerHTML=`<div class="qz-wrap">
      <div style="font-size:2.2rem">🎯</div>
      <div style="font-size:1.1rem;font-weight:600;color:#ccc">指型選擇測驗</div>
      <div style="font-size:.82rem;color:#555;text-align:center">系統出題和弦名稱<br>從 4 張圖選出正確指法</div>
      <button class="fc-btn fc-btn-reveal" style="font-size:.95rem;padding:10px 28px" onclick="qzStart()">🎯 開始測驗</button>
    </div>`;
    return;
  }
  const c=qz.chord;
  const acc=qz.total?Math.round(qz.hits/qz.total*100):'--';
  area.innerHTML=`<div class="qz-wrap">
    <div class="qz-question">${c.name}</div>
    <div class="qz-subtitle">${c.full}</div>
    <div class="qz-opts">
      ${qz.options.map(opt=>{
        let cls='qz-opt'+(qz.answered?' answered':'');
        if(qz.answered){
          if(opt.id===c.id) cls+=' correct';
          else if(opt.id===qz.chosen) cls+=' wrong';
        }
        return `<div class="${cls}" onclick="qzAnswer('${opt.id}')">${chordSVG(opt,110)}</div>`;
      }).join('')}
    </div>
    <div class="qz-meta">
      <div>🔥 連續 <span class="qz-streak-n">${qz.streak}</span></div>
      <div>${qz.total} 題 · 正確率 ${qz.total?acc+'%':'--'}</div>
    </div>
  </div>`;
}

/* ── Chord Detector ── */
let detCtx=null,detAna=null,detStream=null,detRAF=null,detRunning=false;
const STRING_BASE_MIDI=[64,59,55,50,45,40]; // ①e=E4=64, ②B=59, ③G=55, ④D=50, ⑤A=45, ⑥E=40

function noteClass(midi){return((midi%12)+12)%12;}
function freqToMidi(f){return Math.round(12*Math.log2(f/440)+69);}

const _cnCache=new Map();
function chordNoteClasses(ch){
  if(_cnCache.has(ch.id)) return _cnCache.get(ch.id);
  const s=new Set();
  ch.strings.forEach((fret,i)=>{ if(fret!==null) s.add(noteClass(STRING_BASE_MIDI[i]+fret)); });
  _cnCache.set(ch.id,s);
  return s;
}

function scoreChord(detected,ch){
  const cn=chordNoteClasses(ch);
  let hits=0;
  detected.forEach(nc=>{ if(cn.has(nc)) hits++; });
  const precision=detected.size?hits/detected.size:0;
  const recall=cn.size?hits/cn.size:0;
  return (precision*0.6+recall*0.4);
}

function getPeakNoteClasses(ana){
  const buf=new Float32Array(ana.frequencyBinCount);
  ana.getFloatFrequencyData(buf);
  const binHz=detCtx.sampleRate/ana.fftSize;
  const peaks=new Set();
  const thr=-52;
  const lo=Math.floor(70/binHz), hi=Math.ceil(1300/binHz);
  for(let i=lo+1;i<hi-1&&i<buf.length-1;i++){
    if(buf[i]>thr&&buf[i]>buf[i-1]&&buf[i]>buf[i+1]){
      const midi=freqToMidi(i*binHz);
      if(midi>=28&&midi<=88) peaks.add(noteClass(midi));
    }
  }
  return peaks;
}

async function toggleDetector(){
  if(detRunning){ stopDetector(); return; }
  try{
    detStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false},video:false});
    detCtx=new (window.AudioContext||window.webkitAudioContext)();
    const src=detCtx.createMediaStreamSource(detStream);
    detAna=detCtx.createAnalyser();
    detAna.fftSize=8192;
    detAna.smoothingTimeConstant=0.65;
    src.connect(detAna);
    detRunning=true;
    const btn=document.getElementById('det-mic-btn');
    if(btn){btn.classList.add('active');btn.textContent='⏹ 停止聆聽';}
    runDetector();
  }catch(err){
    alert('無法開啟麥克風：'+err.message);
  }
}

function stopDetector(){
  detRunning=false;
  if(detRAF) cancelAnimationFrame(detRAF);
  if(detStream) detStream.getTracks().forEach(t=>t.stop());
  if(detCtx) detCtx.close();
  detStream=detCtx=detAna=null;
  const btn=document.getElementById('det-mic-btn');
  if(btn){btn.classList.remove('active');btn.textContent='🎙 開始聆聽';}
}

function drawSpectrum(){
  const canvas=document.getElementById('det-canvas');
  if(!canvas||!detAna||!detCtx) return;
  const ctx2=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  ctx2.clearRect(0,0,W,H);
  const buf=new Uint8Array(detAna.frequencyBinCount);
  detAna.getByteFrequencyData(buf);
  const binHz=detCtx.sampleRate/detAna.fftSize;
  const lo=Math.floor(60/binHz),hi=Math.ceil(1400/binHz);
  for(let i=0;i<W;i++){
    const b=Math.floor(lo+(hi-lo)*i/W);
    if(b>=buf.length) break;
    const v=buf[b]/255;
    ctx2.fillStyle=`rgba(232,201,122,${0.3+v*0.7})`;
    ctx2.fillRect(i,H*(1-v),1,H*v);
  }
}

let _detThrottle=0;
function runDetector(){
  if(!detRunning) return;
  drawSpectrum();
  const now=performance.now();
  if(now-_detThrottle>120){
    _detThrottle=now;
    const peaks=getPeakNoteClasses(detAna);
    if(peaks.size>=2){
      const scores=CHORDS.map(c=>({c,s:scoreChord(peaks,c)}))
        .sort((a,b)=>b.s-a.s).slice(0,3);
      const detEl=document.getElementById('det-result');
      if(detEl) renderDetResult(scores);
      if(fc.micMode&&fc.started&&fc.chord&&!fc.revealed) fcProcessDetection(scores[0]);
    } else {
      const detEl=document.getElementById('det-result');
      if(detEl) detEl.innerHTML=`<div class="det-big" style="color:#2a2a2a">—</div>`;
      if(fc.micMode) updateFCDetIndicator(null,0);
    }
  }
  detRAF=requestAnimationFrame(runDetector);
}

function renderDetResult(scores){
  const el=document.getElementById('det-result');
  if(!el) return;
  if(scores[0].s<0.28){ el.innerHTML=`<div class="det-big" style="color:#2a2a2a">—</div>`; return; }
  el.innerHTML=`
    <div class="det-big">${scores[0].c.name}</div>
    ${scores.map(({c,s},i)=>`<div class="det-chord-row">
      <div class="det-chord-name" style="${i>0?'color:#555;font-size:.88rem':''}">${c.name}</div>
      <div class="det-bar-bg"><div class="det-bar-fill${i===1?' r2':i===2?' r3':''}" style="width:${Math.round(s*100)}%"></div></div>
      <div class="det-pct">${Math.round(s*100)}%</div>
    </div>`).join('')}
  `;
}

function renderTrain(){
  document.getElementById('train-view').innerHTML=`
    <div class="home-title">💪 肌肉記憶測驗</div>
    <div class="qz-tabs">
      <button class="qz-tab${trainMode==='pick'?' active':''}" onclick="setTrainMode('pick')">🎯 指型選擇</button>
      <button class="qz-tab${trainMode==='strum'?' active':''}" onclick="setTrainMode('strum')">🎙 刷弦挑戰</button>
      <button class="qz-tab" disabled>🎵 音階位置（準備中）</button>
    </div>
    ${trainMode==='pick'?'<div id="qz-area"></div>':''}
    ${trainMode==='strum'?'<div id="fc-area"></div>':''}
  `;
  if(trainMode==='pick') renderQuizPick();
  if(trainMode==='strum') renderFCCard();
}

/* ── Chord popup ── */
let popupCurId=null;
function showPopup(id,e){
  e.stopPropagation();
  const ch=CHORDS.find(c=>c.id===id);
  if(!ch) return;
  popupCurId=id;
  const pop=document.getElementById('chord-popup');
  document.getElementById('popup-name').textContent=`${ch.name}（${ch.full}）`;
  const diffH=DIFF_HINTS[id];
  document.getElementById('popup-diagram').innerHTML=`<div class="${diffH?'ghost-on':''}">${chordSVG(ch,150,{ghosts:diffH?.ghosts})}</div>`;
  const diffEl=document.getElementById('popup-diff');
  if(diffEl){ diffEl.style.display=diffH?'':'none'; if(diffH) diffEl.textContent='👆 '+diffH.msg; }
  updatePopupLearnBtn();
  pop.style.left=Math.min(e.clientX-80,window.innerWidth-200)+'px';
  pop.style.top=(e.clientY+12)+'px';
  pop.classList.add('show');
}
function updatePopupLearnBtn(){
  const btn=document.getElementById('popup-learn-btn');
  const ok=isLearned(popupCurId);
  btn.textContent=ok?'✓ 已學會':'標記學會';
  btn.className='popup-learn-btn'+(ok?' learned':'');
}
function handleLearnToggle(){
  toggleLearned(popupCurId);
  updatePopupLearnBtn();
  const s=SONGS.find(x=>x.id===curSong);
  if(s) document.querySelector('.sheet').innerHTML=curMode==='tab'?renderTabSheet(s.sheet):renderSheet(s.sheet);
  renderChords();
  renderHome();
}
function closePopup(){ document.getElementById('chord-popup').classList.remove('show'); }
document.addEventListener('click', closePopup);

SONGS[0].sheet[0].tab = introTabSVG();
switchTab('songs');
